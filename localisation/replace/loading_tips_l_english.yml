 LOADING_TIP_0: "Attack provinces from as many flanks as possible with as much coordination\n and initiative and you will deal much more extra damage. \n- Irinel"
 LOADING_TIP_1: "Investing on armor for tanks is too expensive if invested for all tank battalions, make just one battalion of different role \n with really high armor instead. \n- Irinel "
 LOADING_TIP_2: "Make sure your tanks are allways attacking, if not, keep them away from the frontline.\n- Irinel "